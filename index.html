<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DM Premium - Oficial</title>
    <style>
        :root {
            --cor-principal: #ff0000;
            --cor-fundo: #0b0b0b;
            --cor-card: #161616;
            --cor-texto: #ffffff;
        }

        body {
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* TELA DE LOGIN BLINDADA */
        #tela-login {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--cor-fundo);
            display: flex; align-items: center; justify-content: center;
            z-index: 10000;
        }

        .caixa-login {
            background: var(--cor-card);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #333;
            width: 85%;
            max-width: 320px;
        }

        .caixa-login h1 { color: var(--cor-principal); margin: 0 0 20px 0; }

        .caixa-login input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #000;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        .caixa-login button {
            width: 100%;
            padding: 15px;
            background: var(--cor-principal);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        /* ESCONDER SITE */
        #conteudo-site { display: none; }

        /* ESTILOS DO PLAYER */
        .header { background: #000; padding: 15px; display: flex; justify-content: center; border-bottom: 1px solid #222; }
        #lupa { width: 90%; padding: 10px; border-radius: 20px; border: 1px solid #333; background: #111; color: #fff; }
        .container { padding: 15px; }
        .video-wrapper { width: 100%; background: #000; border-radius: 12px; overflow: hidden; }
        video { width: 100%; aspect-ratio: 16/9; display: block; }
        .card-video { display: flex; gap: 10px; margin-top: 15px; background: #161616; padding: 10px; border-radius: 8px; }
        .thumb-pequena { width: 100px; height: 60px; border-radius: 4px; object-fit: cover; }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="caixa-login">
            <h1>DM Premium</h1>
            <input type="text" id="campo-senha" placeholder="Digite a senha..." autocomplete="off">
            <button type="button" onclick="verificarSenha()">ENTRAR AGORA</button>
            <p id="msg-erro" style="color: red; font-size: 13px; margin-top: 15px; display: none;">Senha Incorreta!</p>
        </div>
    </div>

    <div id="conteudo-site">
        <div class="header">
            <input type="text" id="lupa" placeholder="🔍 Buscar...">
        </div>
        <div class="container">
            <div class="video-wrapper" id="video-container">
                <video id="video-main" controls playsinline poster="fotovd7.jpg">
                    <source src="video1.mp4" type="video/mp4">
                </video>
            </div>
            <h2 id="titulo-atual" style="font-size: 1.1rem;">Vídeo Principal</h2>
            
            <h3 style="color: #888; margin-top: 30px;">Mais Vídeos</h3>
            <div id="lista-videos"></div>
        </div>
    </div>

    <script>
        // SENHA: DMpr10
        function verificarSenha() {
            const senhaDigitada = document.getElementById('campo-senha').value.trim();
            const msgErro = document.getElementById('msg-erro');

            if (senhaDigitada === "DMpr10") {
                document.getElementById('tela-login').style.removeProperty('display');
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('conteudo-site').style.display = 'block';
                localStorage.setItem('acesso', 'true');
            } else {
                msgErro.style.display = 'block';
                document.getElementById('campo-senha').value = '';
            }
        }

        // Auto-login se já entrou antes
        if (localStorage.getItem('acesso') === 'true') {
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('conteudo-site').style.display = 'block';
        }

        // PLAYER
        const player = document.getElementById('video-main');
        const videos = [
            {arquivo: 'video2.mp4', foto: 'fotovd2.jpg', titulo: 'Vídeo 2'},
            {arquivo: 'video3.mp4', foto: 'fotovd3.jpg', titulo: 'Vídeo 3'},
            {arquivo: 'video4.mp4', foto: 'fotovd4.jpg', titulo: 'Vídeo 4'}
        ];

        const lista = document.getElementById('lista-videos');
        videos.forEach(v => {
            lista.innerHTML += `
                <div class="card-video" onclick="trocarVideo('${v.arquivo}', '${v.foto}', '${v.titulo}')">
                    <img src="${v.foto}" class="thumb-pequena">
                    <div><h4 style="margin:0; font-size:14px;">${v.titulo}</h4></div>
                </div>`;
        });

        function trocarVideo(arq, capa, tit) {
            player.pause();
            player.src = arq;
            player.poster = capa;
            document.getElementById('titulo-atual').innerText = tit;
            player.load();
            player.play().catch(() => {});
        }

        // Pular 10s no toque duplo lateral
        let lastTap = 0;
        document.getElementById('video-container').addEventListener('touchstart', (e) => {
            const now = Date.now();
            if (now - lastTap < 300) {
                const rect = player.getBoundingClientRect();
                const x = e.touches[0].clientX - rect.left;
                player.currentTime += (x > rect.width / 2 ? 10 : -10);
                e.preventDefault();
            }
            lastTap = now;
        });
    </script>
</body>
</html>
