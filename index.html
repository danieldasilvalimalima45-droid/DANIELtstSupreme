<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DM Premium - Versão Final Otimizada</title>
    <style>
        :root {
            --cor-principal: #ff0000;
            --cor-fundo: #0b0b0b;
            --cor-card: #161616;
            --cor-texto: #ffffff;
        }

        body {
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* HEADER */
        .header {
            background-color: rgba(11, 11, 11, 0.95);
            padding: 12px;
            display: flex; justify-content: center;
            border-bottom: 1px solid #222;
            position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(10px);
        }

        #lupa {
            width: 90%; max-width: 500px; padding: 10px 18px;
            border-radius: 20px; border: 1px solid #333;
            background-color: #000; color: white; outline: none;
            transition: border 0.3s;
        }
        #lupa:focus { border-color: var(--cor-principal); }

        /* LAYOUT */
        .container {
            max-width: 1200px; margin: auto;
            display: flex; flex-wrap: wrap; gap: 20px; padding: 15px;
        }

        .area-principal { flex: 2; min-width: 320px; }

        /* PLAYER OTIMIZADO */
        .video-wrapper {
            position: relative;
            width: 100%;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        video {
            width: 100%;
            aspect-ratio: 16 / 9;
            display: block;
            cursor: pointer;
        }

        /* ÁREA LATERAL (SUGESTÕES) */
        .area-lateral { flex: 1; min-width: 300px; }
        
        .titulo-sessao {
            font-size: 16px; margin-bottom: 15px; color: #888;
            text-transform: uppercase; letter-spacing: 1px;
            border-left: 3px solid var(--cor-principal); padding-left: 10px;
        }

        .card-video {
            display: flex; gap: 12px; cursor: pointer;
            padding: 10px; margin-bottom: 8px;
            border-radius: 8px; transition: background 0.2s;
            text-decoration: none; color: white;
        }
        .card-video:hover { background-color: var(--cor-card); }

        .thumb-pequena {
            width: 130px; height: 75px;
            background-color: #222; border-radius: 6px;
            object-fit: cover;
        }

        .info-card h4 { margin: 0; font-size: 14px; color: #eee; }
        .info-card p { margin: 4px 0 0 0; font-size: 12px; color: #666; }

        @media (max-width: 850px) {
            .container { flex-direction: column; }
            .area-lateral { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="lupa" placeholder="🔍 Buscar conteúdo...">
    </div>

    <div class="container">
        
        <div class="area-principal">
            <div class="video-wrapper" id="video-container">
                <video id="video-main" controls playsinline preload="metadata" poster="fotovd7.jpg">
                    <source id="video-source" src="video1.mp4" type="video/mp4">
                </video>
            </div>
            <h2 id="titulo-atual" style="font-size: 1.2rem; margin: 15px 0 5px;">Vídeo Premium 1</h2>
            <p style="color: #555; font-size: 12px;">Dica: Toque duplo para pular 10s | Use as setas no teclado.</p>
        </div>

        <div class="area-lateral">
            <h3 class="titulo-sessao">Mais Vídeos</h3>
            <div id="lista-videos">
                </div>
        </div>
    </div>

    <script>
        const player = document.getElementById('video-main');
        const listaSugeridos = document.getElementById('lista-videos');

        // Banco de dados dos vídeos conforme sua estrutura
        const videos = [
            {arquivo: 'video2.mp4', foto: 'fotovd2.jpg', titulo: 'Conteúdo Exclusivo 2'},
            {arquivo: 'video3.mp4', foto: 'fotovd3.jpg', titulo: 'Conteúdo Exclusivo 3'},
            {arquivo: 'video4.mp4', foto: 'fotovd4.jpg', titulo: 'Conteúdo Exclusivo 4'},
            {arquivo: 'video5.mp4', foto: 'fotovd6.jpg', titulo: 'Conteúdo Exclusivo 5'},
            {arquivo: 'video9.mp4', foto: 'fotovd5.jpg', titulo: 'Conteúdo Exclusivo 6'},
            {arquivo: 'video7.mp4', foto: 'fotovd8.jpg', titulo: 'Conteúdo Exclusivo 7'}
        ];

        // 1. GERAÇÃO AUTOMÁTICA DA GRADE
        videos.forEach(v => {
            listaSugeridos.innerHTML += `
                <div class="card-video" onclick="trocarVideo('${v.arquivo}', '${v.foto}', '${v.titulo}')">
                    <img src="${v.foto}" class="thumb-pequena" alt="Poster">
                    <div class="info-card">
                        <h4>${v.titulo}</h4>
                        <p>${Math.floor(Math.random() * 500) + 10}k visualizações</p>
                    </div>
                </div>`;
        });

        // 2. FUNÇÃO PARA PULAR (Correção para vídeos pesados no Chrome)
        function pular(segundos) {
            // Só tenta pular se o vídeo tiver carregado os metadados (importante p/ > 25MB)
            if (player.readyState >= 1) {
                let tempo = player.currentTime + segundos;
                player.currentTime = Math.max(0, Math.min(tempo, player.duration));
            }
        }

        // 3. TOQUE DUPLO (MOBILE)
        let lastTap = 0;
        document.getElementById('video-container').addEventListener('touchstart', (e) => {
            const now = Date.now();
            if (now - lastTap < 300) {
                const rect = player.getBoundingClientRect();
                const x = e.touches[0].clientX - rect.left;
                x > rect.width / 2 ? pular(10) : pular(-10);
                e.preventDefault();
            }
            lastTap = now;
        });

        // 4. SETAS DO TECLADO (PC)
        window.addEventListener('keydown', (e) => {
            if (document.activeElement.id === 'lupa') return;
            if (e.key === 'ArrowRight') pular(10);
            if (e.key === 'ArrowLeft') pular(-10);
        });

        // 5. TROCA DE VÍDEO (Limpeza de memória para vídeos grandes)
        function trocarVideo(arq, capa, tit) {
            player.pause();
            player.removeAttribute('src'); // Limpa o vídeo anterior do cache do navegador
            player.load(); 
            
            player.src = arq;
            player.poster = capa;
            document.getElementById('titulo-atual').innerText = tit;
            
            player.load();
            player.play().catch(() => console.log("Play manual necessário"));
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>

</body>
</html>
